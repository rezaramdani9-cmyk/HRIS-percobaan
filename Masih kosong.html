<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRis — Sistem Informasi SDM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;font-size:14px;background:#F4F3EE;color:#1C1C1A}

/* ── LOGIN ── */
#login-wrap{position:fixed;inset:0;background:#F4F3EE;display:flex;align-items:center;justify-content:center;z-index:200}
.login-box{background:#fff;border:0.5px solid #E0DFD8;border-radius:16px;padding:40px 36px;width:380px;box-shadow:0 2px 24px rgba(0,0,0,.07)}
.logo{font-size:24px;font-weight:600;margin-bottom:6px;letter-spacing:-0.5px}
.logo span{color:#185FA5}
.login-sub{font-size:13px;color:#888;margin-bottom:28px}
.inp-wrap{margin-bottom:14px}
.inp-label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:500}
.inp{width:100%;padding:10px 14px;border:0.5px solid #D0CFC8;border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff;color:#1C1C1A;transition:border .15s}
.inp:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,.1)}
.login-btn{width:100%;padding:11px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;letter-spacing:.2px;transition:background .15s}
.login-btn:hover{background:#0C447C}
.login-err{font-size:12px;color:#A32D2D;margin-top:10px;display:none;padding:10px 12px;background:#FCEBEB;border-radius:8px}
.login-hint{margin-top:20px;border-top:0.5px solid #E8E7E0;padding-top:16px}
.hint-title{font-size:10px;color:#aaa;margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.hint-row{display:flex;justify-content:space-between;font-size:12px;color:#666;padding:4px 0;align-items:center}
.hint-row .email{color:#185FA5;font-weight:500}
.hint-row .pass{font-family:'DM Mono',monospace;font-size:11px;background:#F4F3EE;padding:2px 6px;border-radius:4px;color:#444}
.hint-role{font-size:10px;color:#999;width:80px}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:230px;background:#fff;border-right:0.5px solid #E0DFD8;display:flex;flex-direction:column;flex-shrink:0}
#sid-hdr{padding:16px 18px;border-bottom:0.5px solid #E0DFD8}
#sid-logo{font-size:18px;font-weight:600;letter-spacing:-.3px}
#sid-logo span{color:#185FA5}
#user-info{margin-top:12px;display:flex;align-items:center;gap:10px}
#user-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
#user-name{font-size:13px;font-weight:500;line-height:1.3}
#user-rolebadge{font-size:10px;margin-top:1px}
#nav{flex:1;overflow-y:auto;padding:10px 10px}
.nav-sec{font-size:10px;color:#bbb;padding:14px 8px 5px;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;cursor:pointer;color:#666;font-size:13px;margin-bottom:2px;transition:all .15s;font-weight:500;position:relative}
.nav-item:hover{background:#F4F3EE;color:#1C1C1A}
.nav-item.active{background:#E6F1FB;color:#185FA5}
.nav-item i{font-size:17px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{position:absolute;right:10px;background:#A32D2D;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
#sid-foot{padding:12px 14px;border-top:0.5px solid #E0DFD8}
.logout-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;cursor:pointer;color:#888;font-size:13px;font-weight:500;transition:all .15s}
.logout-btn:hover{background:#FCEBEB;color:#A32D2D}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:56px;background:#fff;border-bottom:0.5px solid #E0DFD8;display:flex;align-items:center;padding:0 24px;gap:10px;flex-shrink:0}
#page-title{font-size:16px;font-weight:600;flex:1;letter-spacing:-.2px}
#tb-acts{display:flex;gap:8px}
#content{flex:1;overflow-y:auto;padding:24px}

/* ── COMPONENTS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:0.5px solid #E0DFD8;border-radius:12px;padding:16px 18px}
.stat-lbl{font-size:11px;color:#888;margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.stat-val{font-size:24px;font-weight:600;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:#bbb;margin-top:3px}

.card{background:#fff;border:0.5px solid #E0DFD8;border-radius:14px;padding:18px 22px;margin-bottom:18px}
.card-title{font-size:14px;font-weight:600;margin-bottom:16px;letter-spacing:-.1px}

table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;padding:0 14px 12px 0;text-align:left;border-bottom:0.5px solid #E0DFD8}
td{padding:11px 14px 11px 0;border-bottom:0.5px solid #F0EFE8;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF8}

.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.b-blue{background:#E6F1FB;color:#185FA5}
.b-green{background:#EAF3DE;color:#3B6D11}
.b-amber{background:#FAEEDA;color:#854F0B}
.b-red{background:#FCEBEB;color:#A32D2D}
.b-gray{background:#F1EFE8;color:#5F5E5A}
.b-purple{background:#EEEDFE;color:#3C3489}
.b-teal{background:#E1F5EE;color:#0F6E56}
.b-coral{background:#FAECE7;color:#993C1D}
.b-pink{background:#FDE8F4;color:#8B2062}
.b-orange{background:#FEF0E6;color:#924010}

.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:0.5px solid #D0CFC8;cursor:pointer;font-size:12px;font-weight:500;background:#fff;color:#666;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn:hover{background:#F4F3EE;color:#1C1C1A;border-color:#B0AFA8}
.btn-green{background:#EAF3DE;border-color:#9FE1CB;color:#3B6D11}
.btn-green:hover{background:#C0DD97;border-color:#639922}
.btn-red{background:#FCEBEB;border-color:#F7C1C1;color:#A32D2D}
.btn-red:hover{background:#F7C1C1;border-color:#E24B4A}
.btn-blue{background:#E6F1FB;border-color:#B5D4F4;color:#185FA5}
.btn-blue:hover{background:#B5D4F4}
.btn-primary{background:#185FA5;color:#fff;border-color:transparent}
.btn-primary:hover{background:#0C447C}
.tb-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:9px;border:0.5px solid #D0CFC8;cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;background:#fff;color:#555;transition:all .15s}
.tb-btn:hover{background:#F4F3EE;border-color:#B0AFA8}
.tb-btn.primary{background:#185FA5;color:#fff;border-color:transparent}
.tb-btn.primary:hover{background:#0C447C}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px 30px;width:560px;max-height:88vh;overflow-y:auto;position:relative}
.modal-title{font-size:17px;font-weight:600;margin-bottom:22px;letter-spacing:-.2px}
.modal-close{position:absolute;top:18px;right:18px;cursor:pointer;color:#888;font-size:20px;border:none;background:none;padding:4px;border-radius:6px;line-height:1}
.modal-close:hover{background:#F4F3EE;color:#1C1C1A}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{margin-bottom:0}
.fg label{display:block;font-size:12px;font-weight:500;color:#666;margin-bottom:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:0.5px solid #D0CFC8;border-radius:9px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff;color:#1C1C1A;transition:border .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,.1)}
.fg input:disabled{background:#F8F7F2;color:#aaa;cursor:not-allowed}
.fg-full{grid-column:1/-1}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:22px;padding-top:18px;border-top:0.5px solid #E8E7E0}

/* ── SLIP ── */
.slip-wrap{background:#fff;border:0.5px solid #E0DFD8;border-radius:14px;overflow:hidden}
.slip-hdr{background:linear-gradient(135deg,#185FA5 0%,#0C447C 100%);color:#fff;padding:20px 24px}
.slip-co{font-size:16px;font-weight:600;letter-spacing:-.2px}
.slip-period{font-size:12px;opacity:.75;margin-top:3px}
.slip-body{padding:18px 24px}
.slip-emp-row{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.sei{flex:1;min-width:100px}
.sei-l{font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.sei-v{font-size:13px;font-weight:600;margin-top:3px}
.slip-tbl{width:100%;font-size:13px;border-collapse:collapse}
.slip-tbl td{padding:7px 0;border-bottom:0.5px solid #F0EFE8}
.slip-tbl tr:last-child td{border-bottom:none}
.slip-tbl .lbl{color:#666}
.slip-tbl .amt{text-align:right;font-weight:600;font-family:'DM Mono',monospace;font-size:12px}
.slip-total{background:#F4F3EE;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
.slip-total-lbl{font-size:13px;font-weight:600}
.slip-total-val{font-size:20px;font-weight:600;color:#185FA5;font-family:'DM Mono',monospace;letter-spacing:-.5px}

.komp-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.komp-row input{padding:8px 11px;border:0.5px solid #D0CFC8;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff;color:#1C1C1A;transition:border .15s}
.komp-row input:focus{outline:none;border-color:#378ADD}
.komp-del{padding:7px 9px;border:0.5px solid #E0DFD8;border-radius:8px;background:#F8F7F2;cursor:pointer;color:#A32D2D;font-size:15px;line-height:1;transition:all .15s}
.komp-del:hover{background:#FCEBEB;border-color:#F7C1C1}

/* ── UPLOAD ── */
.drop-zone{border:1.5px dashed #C0BFB8;border-radius:14px;padding:44px 24px;text-align:center;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.drag{background:#F0F4FB;border-color:#378ADD}
.drop-icon{font-size:40px;color:#C0BFB8;margin-bottom:12px;transition:color .2s}
.drop-zone:hover .drop-icon,.drop-zone.drag .drop-icon{color:#378ADD}

/* ── APPROVAL ── */
.apr-card{background:#fff;border:0.5px solid #E0DFD8;border-radius:14px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.apr-ico{width:42px;height:42px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;color:#185FA5;flex-shrink:0;font-size:19px}
.apr-info{flex:1}
.apr-name{font-size:14px;font-weight:600}
.apr-sub{font-size:12px;color:#888;margin-top:2px}
.apr-ket{font-size:12px;color:#555;margin-top:6px;padding:6px 10px;background:#F8F7F2;border-radius:6px}
.apr-acts{display:flex;gap:8px}

/* ── CUTI IZIN ── */
.izin-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.izin-type-card{border:1.5px solid #E0DFD8;border-radius:12px;padding:14px 12px;cursor:pointer;text-align:center;transition:all .18s;background:#fff}
.izin-type-card:hover{border-color:#378ADD;background:#F0F4FB}
.izin-type-card.selected{border-color:#185FA5;background:#E6F1FB}
.izin-type-card i{font-size:22px;display:block;margin-bottom:7px}
.izin-type-card .itc-label{font-size:12px;font-weight:600;margin-bottom:2px}
.izin-type-card .itc-sub{font-size:10px;color:#888}
.izin-history-card{background:#fff;border:0.5px solid #E0DFD8;border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;transition:box-shadow .15s}
.izin-history-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.izin-hist-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.izin-sisa-bar{background:#F4F3EE;border-radius:10px;height:8px;overflow:hidden;margin-top:5px}
.izin-sisa-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#185FA5,#378ADD);transition:width .5s}
.izin-detail-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:0.5px solid #F0EFE8}
.izin-detail-row:last-child{border-bottom:none}
.izin-detail-lbl{color:#888}
.izin-detail-val{font-weight:600}
.quota-card{background:#fff;border:0.5px solid #E0DFD8;border-radius:12px;padding:16px 18px;margin-bottom:12px}
.quota-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.quota-title{font-size:13px;font-weight:600}
.quota-nums{font-size:12px;color:#888;font-family:'DM Mono',monospace}
.quota-used{font-size:11px;color:#888;margin-top:4px}

/* ── SEARCH ── */
.search-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-row input,.search-row select{padding:8px 12px;border:0.5px solid #D0CFC8;border-radius:9px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff;color:#1C1C1A;transition:border .15s}
.search-row input{flex:1;min-width:160px}
.search-row input:focus,.search-row select:focus{outline:none;border-color:#378ADD}

.pill-tabs{display:flex;gap:4px;padding:4px;background:#F0EFE8;border-radius:10px;margin-bottom:16px;width:fit-content}
.pill-tab{padding:6px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:#888;transition:all .15s}
.pill-tab.active{background:#fff;color:#1C1C1A;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* ── NOTIF ── */
#notif{position:fixed;bottom:24px;right:24px;background:#1C1C1A;color:#fff;border-radius:12px;padding:12px 18px;font-size:13px;font-weight:500;z-index:500;display:none;max-width:300px;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:opacity .2s}

.empty{text-align:center;padding:56px 20px;color:#C0BFB8}
.empty i{font-size:40px;display:block;margin-bottom:12px}
.empty p{font-size:13px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D0CFC8;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#B0AFA8}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap">
  <div class="login-box">

<!-- APP -->
<div id="app" style="display:none">
  <div id="sidebar">

<!-- MODAL -->

function doLogin(){
  const email = document.getElementById('l-email').value.trim().toLowerCase();
  const pass = document.getElementById('l-pass').value;
  const acc = ACCOUNTS.find(a => a.email === email && a.pass === pass);
  if(!acc){ document.getElementById('l-err').style.display='block'; return; }
  document.getElementById('l-err').style.display='none';
  curUser = acc;
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').style.display='flex';
  initApp();
}

function doLogout(){
  curUser = null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('l-email').value='';
  document.getElementById('l-pass').value='';
}

function initApp(){
  const rc = ROLE_CFG[curUser.role];
  const initials = curUser.nama.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const av = document.getElementById('user-avatar');
  av.textContent = initials;
  av.style.cssText = `width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:${rc.bg};color:${rc.color}`;
  document.getElementById('user-name').textContent = curUser.nama;
  document.getElementById('user-rolebadge').innerHTML = `<span class="badge" style="font-size:10px;background:${rc.bg};color:${rc.color}">${rc.label}</span>`;

  buildNav();
  goTo('dashboard');
}

function buildNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  NAV_MAP[curUser.role].forEach(sec => {
    const cfg = NAV_LABELS[sec];
    const d = document.createElement('div');
    d.className = 'nav-item';
    d.dataset.sec = sec;
    d.innerHTML = `<i class="ti ${cfg.icon}"></i>${cfg.label}`;
    d.onclick = () => goTo(sec);
    nav.appendChild(d);
  });
  updateNavBadges();
}

function updateNavBadges(){
  // Update approval badge
  const pending = getPendingCount();
  document.querySelectorAll('.nav-badge').forEach(b=>b.remove());
  if(pending > 0){
    const aprNav = document.querySelector('[data-sec="approval"]');
    if(aprNav) aprNav.insertAdjacentHTML('beforeend',`<span class="nav-badge">${pending}</span>`);
  }
}

function getPendingCount(){
  return APPROVALS.filter(a=>{
    if(curUser.role==='supervisor') return a.lvl==='supervisor' && a.status==='pending';
    if(curUser.role==='manajer') return ['supervisor','manajer'].includes(a.lvl) && a.status==='pending';
    return a.status==='pending';
  }).length;
}

function goTo(sec){
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.sec === sec));
  document.getElementById('page-title').textContent = NAV_LABELS[sec]?.label || sec;
  document.getElementById('tb-acts').innerHTML = '';
  render(sec);
}

function render(sec){
  const c = document.getElementById('content');
  const tb = document.getElementById('tb-acts');
  const canEdit = ['administrator','admin_hrd'].includes(curUser.role);
  if(sec==='dashboard') renderDashboard(c,canEdit);
  else if(sec==='karyawan') renderKaryawan(c,tb,canEdit);
  else if(sec==='upload') renderUpload(c);
  else if(sec==='gaji') renderGaji(c,tb);
  else if(sec==='approval') renderApproval(c);
  else if(sec==='laporan') renderLaporan(c);
  else if(sec==='akun') renderAkun(c,tb);
  else if(sec==='my_cuti') renderMyCuti(c,tb);
  else if(sec==='my_slip') renderMySlip(c);
  else if(sec==='my_profile') renderMyProfile(c);
}

function renderKuotaCards(empId){
  const q = KUOTA_CUTI[empId] || {};
  const items = [
    {key:'tahunan',label:'Cuti Tahunan',color:'#185FA5'},
    {key:'sakit',label:'Cuti Sakit',color:'#0F6E56'},
    {key:'penting',label:'Cuti Penting',color:'#854F0B'},
    {key:'melahirkan',label:'Cuti Melahirkan',color:'#8B2062'},
  ];
  return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px">${items.map(item=>{
    const d = q[item.key]||{total:0,terpakai:0};
    const sisa = d.total - d.terpakai;
    const pct = d.total>0 ? Math.round((d.terpakai/d.total)*100) : 0;
    return `<div class="quota-card">
      <div class="quota-header">
        <div class="quota-title">${item.label}</div>
        <div class="quota-nums" style="color:${item.color}">${sisa}/${d.total}</div>
      </div>
      <div class="izin-sisa-bar"><div class="izin-sisa-fill" style="width:${pct}%;background:${item.color}"></div></div>
      <div class="quota-used" style="margin-top:5px">${d.terpakai} hari terpakai · ${sisa} hari tersisa</div>
    </div>`;
  }).join('')}</div>`;
}

function renderMyIzinMini(empId){
  const list = IZIN_HISTORY.filter(i=>i.empId===empId).slice(-4).reverse();
  if(!list.length) return `<div class="empty" style="padding:28px"><i class="ti ti-calendar-event"></i><p>Belum ada pengajuan</p></div>`;
  const stBadge = {pending:'b-amber',approved:'b-green',rejected:'b-red'};
  const stLabel = {pending:'Menunggu',approved:'Disetujui',rejected:'Ditolak'};
  return `<table><tr><th>Jenis</th><th>Tanggal</th><th>Durasi</th><th>Status</th></tr>
    ${list.map(i=>`<tr>
      <td style="font-weight:600">${i.label}</td>
      <td style="color:#888;font-size:12px">${i.tgl_mulai}${i.tgl_selesai&&i.tgl_selesai!==i.tgl_mulai?' s/d '+i.tgl_selesai:''}</td>
      <td style="font-size:12px">${i.durasi>0?i.durasi+' hari':i.jam?'s/d '+i.jam:'1 hari'}</td>
      <td><span class="badge ${stBadge[i.status]}">${stLabel[i.status]}</span></td>
    </tr>`).join('')}
  </table>`;
}

function renderIzinHistoryList(list){
  if(!list.length) return `<div class="empty" style="padding:36px"><i class="ti ti-calendar-event"></i><p>Belum ada riwayat pengajuan</p></div>`;
  const stBadge = {pending:'b-amber',approved:'b-green',rejected:'b-red'};
  const stLabel = {pending:'⏳ Menunggu Persetujuan',approved:'✓ Disetujui',rejected:'✗ Ditolak'};
  const stIcon = {pending:'#FAEEDA',approved:'#EAF3DE',rejected:'#FCEBEB'};
  return list.reverse().map(i=>{
    const cfg = IZIN_TYPES[i.jenis]||{color:'#666',bg:'#F4F3EE',icon:'ti-calendar'};
    return `<div class="izin-history-card">
      <div class="izin-hist-ico" style="background:${cfg.bg};color:${cfg.color}"><i class="ti ${cfg.icon}"></i></div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px">
          <div>
            <div style="font-size:14px;font-weight:600">${i.label}</div>
            <div style="font-size:12px;color:#888;margin-top:2px">
              📅 ${i.tgl_mulai}${i.tgl_selesai&&i.tgl_selesai!==i.tgl_mulai?' s/d '+i.tgl_selesai:''}
              ${i.jam?' · ⏰ s/d jam '+i.jam:''}
              ${i.durasi>0?' · <strong>'+i.durasi+' hari</strong>':''}
            </div>
            <div style="font-size:12px;color:#555;margin-top:5px;padding:5px 8px;background:#F8F7F2;border-radius:6px;max-width:360px">"${i.ket}"</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <span class="badge ${stBadge[i.status]}">${stLabel[i.status]}</span>
            ${i.disetujui_oleh?`<div style="font-size:10px;color:#aaa">oleh: ${i.disetujui_oleh}</div>`:''}
            ${i.status==='pending'?`<button class="btn btn-red" style="font-size:11px;padding:4px 8px" onclick="batalIzin('${i.id}')"><i class="ti ti-x"></i> Batalkan</button>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setIzinTab(filter, el){
  document.querySelectorAll('#izin-tabs .pill-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const empId = curUser.empId;
  let list = IZIN_HISTORY.filter(i=>i.empId===empId);
  if(filter!=='semua') list = list.filter(i=>i.status===filter);
  document.getElementById('izin-history-list').innerHTML = renderIzinHistoryList(list);
}

function batalIzin(id){
  const i = IZIN_HISTORY.find(x=>x.id===id);
  if(!i||i.status!=='pending') return;
  // Hapus dari approval juga
  const aprIdx = APPROVALS.findIndex(a=>a.id.startsWith('APR')&&a.ket===i.ket&&a.empId===i.empId);
  if(aprIdx>-1) APPROVALS.splice(aprIdx,1);
  i.status = 'cancelled';
  IZIN_HISTORY.splice(IZIN_HISTORY.findIndex(x=>x.id===id),1);
  notify('Pengajuan berhasil dibatalkan.');
  renderMyCuti(document.getElementById('content'), document.getElementById('tb-acts'));
  updateNavBadges();
}

function selectIzinType(key){

  const cfg = IZIN_TYPES[key];
  const detail = document.getElementById('izin-form-detail');
  detail.style.display = 'block';
  document.getElementById('btn-submit-izin').style.display = 'inline-flex';

  // Tampilkan/sembunyikan field sesuai jenis
  document.getElementById('fg-tgl-selesai').style.display = cfg.needDate2 ? '' : 'none';
  const fgJam = document.getElementById('fg-jam');
  fgJam.style.display = cfg.needJam ? '' : 'none';

  // Label jam
  if(cfg.needJam){
    const lbl = key==='izin_terlambat' ? 'Estimasi Jam Masuk (terlambat)' : 'Estimasi Jam Pulang (lebih awal)';
    document.getElementById('iz-jam-label').textContent = lbl;
  }

  // Info jenis
  document.getElementById('fg-jenis-info').innerHTML = `
    <div style="padding:10px 14px;background:${cfg.bg};border-radius:9px;display:flex;align-items:center;gap:10px">
      <i class="ti ${cfg.icon}" style="font-size:18px;color:${cfg.color}"></i>
      <div>
        <div style="font-size:13px;font-weight:600;color:${cfg.color}">${cfg.label}</div>
        <div style="font-size:11px;color:#888;margin-top:1px">${getIzinDesc(key)}</div>
      </div>
    </div>`;

  // Quota info
  updateQuotaInfo(key);

  // Toggle lampiran dokumen
  const needDoc = ['cuti_sakit','cuti_melahirkan','cuti_penting'].includes(key);
  document.getElementById('fg-dokumen').style.display = needDoc ? '' : 'none';
}

function getIzinDesc(key){
  const desc = {
    cuti_tahunan:'Gunakan jatah cuti tahunan Anda. Disetujui supervisor/manajer.',
    cuti_sakit:'Untuk sakit/pemulihan. Bisa disertai surat dokter.',
    cuti_melahirkan:'Hak cuti melahirkan hingga 90 hari bagi ibu.',
    cuti_penting:'Untuk keperluan mendesak: pernikahan, kematian keluarga, dll.',
    izin_pulang:'Izin meninggalkan kantor sebelum jam kerja selesai.',
    izin_terlambat:'Izin datang melebihi jam masuk yang ditentukan.',
    izin_tidak_masuk:'Tidak masuk kerja karena keperluan mendadak.',
  };
  return desc[key]||'';
}

function updateQuotaInfo(key){
  const empId = curUser.empId;
  const cfg = IZIN_TYPES[key];
  const quota = KUOTA_CUTI[empId];
  const el = document.getElementById('iz-quota-info');
  if(!cfg.quota || !quota){ el.innerHTML=''; return; }
  const q = quota[cfg.quota]||{total:0,terpakai:0};
  const sisa = q.total - q.terpakai;
  const color = sisa<=2?'#A32D2D':sisa<=5?'#854F0B':'#3B6D11';
  el.innerHTML = `<div style="font-size:12px;padding:8px 12px;background:${sisa<=2?'#FCEBEB':sisa<=5?'#FAEEDA':'#EAF3DE'};border-radius:8px;color:${color}">
    <i class="ti ti-info-circle"></i> Sisa kuota ${cfg.label}: <strong>${sisa} hari</strong> (dari ${q.total} hari/tahun · ${q.terpakai} terpakai)
  </div>`;
}

function submitIzin(){
  if(!selIzinType){ notify('Pilih jenis cuti/izin terlebih dahulu!'); return; }
  const cfg = IZIN_TYPES[selIzinType];
  const tgl1 = document.getElementById('iz-tgl1').value;
  const tgl2 = cfg.needDate2 ? document.getElementById('iz-tgl2').value : tgl1;
  const jam = cfg.needJam ? document.getElementById('iz-jam').value : null;
  const ket = document.getElementById('iz-ket').value.trim();

  if(!tgl1){ notify('Tanggal mulai wajib diisi!'); return; }
  if(cfg.needDate2 && tgl2 < tgl1){ notify('Tanggal selesai tidak boleh sebelum tanggal mulai!'); return; }
  if(!ket){ notify('Keterangan / alasan wajib diisi!'); return; }

  // Hitung durasi hari kerja (sederhana)
  const d1 = new Date(tgl1), d2 = new Date(tgl2);
  const durasi = cfg.needDate2 ? Math.round((d2-d1)/86400000)+1 : 0;

  // Cek quota
  const empId = curUser.empId;
  const quota = KUOTA_CUTI[empId];
  if(cfg.quota && quota){
    const q = quota[cfg.quota];
    const sisa = q.total - q.terpakai;
    if(durasi > sisa){
      notify(`Kuota tidak cukup! Sisa ${sisa} hari, kamu ajukan ${durasi} hari.`);
      return;
    }
  }

  // Generate ID
  const newId = 'IZN' + String(IZIN_HISTORY.length+1).padStart(3,'0');
  const aprId = 'APR' + String(APPROVALS.length+1).padStart(3,'0');
  const today = new Date().toISOString().slice(0,10);
  const emp = EMPLOYEES.find(e=>e.id===empId);

  // Tentukan level approval
  const aprLvl = ['cuti_melahirkan','cuti_penting','cuti_tahunan'].includes(selIzinType) ? 'manajer' : 'supervisor';

  IZIN_HISTORY.push({
    id:newId, empId, karyawan:curUser.nama,
    jenis:selIzinType, label:cfg.label,
    tgl_mulai:tgl1, tgl_selesai:tgl2,
    durasi, jam, ket, status:'pending',
    tgl_pengajuan:today, disetujui_oleh:null
  });

  // Tambahkan ke antrian approval
  APPROVALS.push({
    id:aprId,
    jenis:cfg.label,
    karyawan:curUser.nama,
    empId, tgl:today,
    lvl:aprLvl,
    status:'pending',
    ket:`${ket}${durasi>0?' ('+durasi+' hari)':''}${jam?' — s/d jam '+jam:''}`,
    tipe:'leave',
    izinId:newId
  });

  closeModal();
  document.getElementById('modal-box').style.width = '';
  notify(`✓ Pengajuan ${cfg.label} berhasil dikirim! Menunggu persetujuan ${aprLvl}.`);
  renderMyCuti(document.getElementById('content'), document.getElementById('tb-acts'));
  updateNavBadges();
}

    <td style="font-weight:600">${e.nama}</td>

function filterEmp(){
  const q = document.getElementById('s-emp').value.toLowerCase();
  const dept = document.getElementById('s-dept').value;
  const st = document.getElementById('s-status').value;
  const canEdit = ['administrator','admin_hrd'].includes(curUser.role);
  const filtered = EMPLOYEES.filter(e =>
    (e.nama.toLowerCase().includes(q) || e.id.toLowerCase().includes(q)) &&
    (!dept || e.dept===dept) && (!st || e.status===st)
  );
  const tbl = document.getElementById('emp-tbl');
  tbl.querySelectorAll('tr:not(:first-child)').forEach(r=>r.remove());
  tbl.insertAdjacentHTML('beforeend', empRows(filtered, canEdit));
  document.getElementById('emp-count').textContent = filtered.length + ' karyawan ditemukan';
}

function toggleStatus(id){
  const e = EMPLOYEES.find(e=>e.id===id);
  e.status = e.status==='aktif'?'nonaktif':'aktif';

function renderUpload(c){
  c.innerHTML = `
    <div class="card">
      <div class="card-title">Upload Data Karyawan</div>
      <div class="drop-zone" id="drop-zone" onclick="triggerFile()"
        ondragover="onDrag(event,true)" ondragleave="onDrag(event,false)" ondrop="onDrop(event)">
        <input type="file" id="file-inp" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(this.files[0])">
        <div class="drop-icon"><i class="ti ti-file-spreadsheet"></i></div>
        <div style="font-size:14px;font-weight:600;margin-bottom:6px">Klik atau drag & drop file di sini</div>
        <div style="font-size:13px;color:#888">Mendukung format .xlsx, .xls, dan .csv — maks 10MB</div>
      </div>
    </div>
    <div id="preview-card" style="display:none"></div>`;
}

function triggerFile(){ document.getElementById('file-inp').click(); }
function onDrag(e,over){ e.preventDefault(); document.getElementById('drop-zone').classList.toggle('drag',over); }
function onDrop(e){
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if(f) handleFile(f);
}

function handleFile(file){
  if(!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if(!['xlsx','xls','csv'].includes(ext)){ notify('Format tidak didukung!'); return; }
  if(file.size > 10*1024*1024){ notify('File terlalu besar! Maks 10MB'); return; }
  if(ext === 'csv'){
    const reader = new FileReader();
    reader.onload = ev => {
      const lines = ev.target.result.split('\n').filter(l=>l.trim());
      if(lines.length < 2){ notify('File CSV kosong atau tidak valid'); return; }
      const sep = lines[0].includes(';') ? ';' : ',';
      const headers = lines[0].split(sep).map(h=>h.trim().replace(/"/g,'').toLowerCase());
      const rows = lines.slice(1).map(l => {
        const vals = l.split(sep).map(v=>v.trim().replace(/"/g,''));
        const obj = {};
        headers.forEach((h,i) => obj[h] = vals[i]||'');
        return obj;
      });
      showUploadPreview(rows, file.name);
    };
    reader.readAsText(file, 'UTF-8');
  } else {
    const demoRows = [
      {'nama lengkap':'Rina Maulida','jabatan':'Finance Staff','departemen':'Keuangan','gaji pokok':'6500000','email':'rina@perusahaan.com','gender':'Perempuan'},
      {'nama lengkap':'Tono Wibowo','jabatan':'IT Support','departemen':'Teknologi','gaji pokok':'5800000','email':'tono@perusahaan.com','gender':'Laki-laki'},
    ];
    notify('File Excel terdeteksi: ' + file.name);
    showUploadPreview(demoRows, file.name);
  }
}

function showUploadPreview(rows, fname){
  const norm = rows.map((r,i) => ({
    id: r['id']||r['id karyawan']||'',
    nama: r['nama lengkap']||r['nama']||'',
    jabatan: r['jabatan']||'',
    dept: r['departemen']||r['dept']||'',
    gapok: parseInt((r['gaji pokok']||'0').replace(/\D/g,''))||0,
    email: r['email']||'',
    gender: r['gender']||'Laki-laki',
    status: 'aktif',
    tgl_masuk: r['tanggal masuk']||new Date().toISOString().slice(0,10),
    telp: r['no hp']||'',
  })).filter(r => r.nama);
  if(!norm.length){ notify('Tidak ada data valid!'); return; }
  const pc = document.getElementById('preview-card');
  pc.style.display = 'block';
  pc.innerHTML = `<div class="card">
    <div class="card-title">Preview — ${fname}</div>
    <div style="overflow-x:auto"><table>
      <tr><th>#</th><th>Nama</th><th>Jabatan</th><th>Departemen</th><th>Gaji Pokok</th></tr>
      ${norm.map((r,i)=>`<tr><td style="color:#bbb;font-size:11px">${i+1}</td><td style="font-weight:600">${r.nama}</td><td>${r.jabatan||'-'}</td><td>${r.dept||'-'}</td><td style="font-family:'DM Mono',monospace;font-size:12px">Rp ${r.gapok.toLocaleString('id')}</td></tr>`).join('')}
    </table></div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button class="btn btn-primary" onclick='importData(${JSON.stringify(norm)})'><i class="ti ti-database-import"></i> Import ${norm.length} Karyawan</button>
      <button class="btn" onclick="document.getElementById('preview-card').style.display='none'">Batal</button>
    </div>
  </div>`;
}

function importData(rows){
  let added=0, skip=0;
  rows.forEach(r=>{
    const newId = r.id || ('EMP'+String(EMPLOYEES.length+added+1).padStart(3,'0'));
    if(EMPLOYEES.find(e=>e.id===newId)){ skip++; return; }
    EMPLOYEES.push({...r, id:newId});
    GAJI_DATA[newId] = {tambahan:[], potongan:[], periode:'Mei 2024'};
    KUOTA_CUTI[newId] = {tahunan:{total:12,terpakai:0},sakit:{total:30,terpakai:0},melahirkan:{total:90,terpakai:0},penting:{total:3,terpakai:0}};
    added++;
  });
  notify(`${added} karyawan berhasil diimport!${skip>0?' '+skip+' dilewati.':''}`);
  document.getElementById('preview-card').style.display = 'none';
}

function kompRow(empId, type, i, item){
  return `<div class="komp-row" id="kr-${empId}-${type}-${i}">
    <input value="${item.ket}" placeholder="Keterangan" style="flex:1" onchange="updateKomp('${empId}','${type}',${i},'ket',this.value)">
    <input value="${item.jml}" type="number" min="0" style="width:120px" onchange="updateKomp('${empId}','${type}',${i},'jml',parseInt(this.value)||0)">
    <button class="komp-del" onclick="removeKomp('${empId}','${type}',${i})"><i class="ti ti-trash"></i></button>
  </div>`;
}

function updateKomp(id,type,i,field,val){ GAJI_DATA[id][type][i][field]=val; refreshSlip(id); }
function updateGapok(id,val){ EMPLOYEES.find(e=>e.id===id).gapok=parseInt(val)||0; refreshSlip(id); }
function addKomp(id,type){ GAJI_DATA[id][type].push({ket:'',jml:0}); renderGajiPanel(id); }
function removeKomp(id,type,i){ GAJI_DATA[id][type].splice(i,1); renderGajiPanel(id); }
function refreshSlip(id){ const w=document.getElementById('slip-preview'); if(w) w.innerHTML=buildSlip(id); }

function buildSlip(id){
  const e = EMPLOYEES.find(e=>e.id===id);
  const g = GAJI_DATA[id];
  const totalT = g.tambahan.reduce((s,t)=>s+t.jml,0);
  const totalP = g.potongan.reduce((s,p)=>s+p.jml,0);
  const thp = e.gapok + totalT - totalP;
  const periode = document.getElementById('g-periode')?.value || g.periode;
  return `<div class="slip-wrap">
    <div class="slip-hdr"><div class="slip-co">PT. Maju Bersama Indonesia</div><div class="slip-period">Slip Gaji Karyawan · ${periode}</div></div>
    <div class="slip-body">
      <div class="slip-emp-row">
        <div class="sei"><div class="sei-l">Nama</div><div class="sei-v">${e.nama}</div></div>
        <div class="sei"><div class="sei-l">ID</div><div class="sei-v">${e.id}</div></div>
        <div class="sei"><div class="sei-l">Jabatan</div><div class="sei-v">${e.jabatan}</div></div>
        <div class="sei"><div class="sei-l">Departemen</div><div class="sei-v">${e.dept}</div></div>
      </div>
      <table class="slip-tbl">
        <tr><td class="lbl">Gaji Pokok</td><td class="amt">Rp ${e.gapok.toLocaleString('id')}</td></tr>
        ${g.tambahan.map(t=>`<tr><td class="lbl">${t.ket||'Tunjangan'}</td><td class="amt" style="color:#3B6D11">+ Rp ${t.jml.toLocaleString('id')}</td></tr>`).join('')}
        <tr style="background:#F8F7F2"><td class="lbl" style="font-weight:600;padding:8px 0">Subtotal Penghasilan</td><td class="amt" style="font-weight:600">Rp ${(e.gapok+totalT).toLocaleString('id')}</td></tr>
        ${g.potongan.map(p=>`<tr><td class="lbl" style="color:#A32D2D">${p.ket||'Potongan'}</td><td class="amt" style="color:#A32D2D">− Rp ${p.jml.toLocaleString('id')}</td></tr>`).join('')}
      </table>
    </div>
    <div class="slip-total">
      <div><div class="slip-total-lbl">Gaji Bersih (Take Home Pay)</div><div style="font-size:11px;color:#888;margin-top:2px">${periode}</div></div>
      <div class="slip-total-val">Rp ${thp.toLocaleString('id')}</div>
    </div>
  </div>`;
}

function kirimSlip(id){ const e=EMPLOYEES.find(e=>e.id===id); notify(`Slip gaji dikirim ke ${e.email||e.nama}!`); }

function renderApproval(c){
  const getList = () => APPROVALS.filter(a=>{
    if(curUser.role==='supervisor') return a.lvl==='supervisor';
    if(curUser.role==='manajer') return ['supervisor','manajer'].includes(a.lvl);
    return true;
  });
  const all = getList();
  c.innerHTML = `
    <div class="pill-tabs" id="apr-tabs">
      <div class="pill-tab active" onclick="setAprTab('semua',this)">Semua (${all.length})</div>
      <div class="pill-tab" onclick="setAprTab('pending',this)">Menunggu (${all.filter(a=>a.status==='pending').length})</div>
      <div class="pill-tab" onclick="setAprTab('approved',this)">Disetujui (${all.filter(a=>a.status==='approved').length})</div>
      <div class="pill-tab" onclick="setAprTab('rejected',this)">Ditolak (${all.filter(a=>a.status==='rejected').length})</div>
    </div>
    <div id="apr-list">${aprCards(all)}</div>`;
}

function aprCards(list){
  if(!list.length) return '<div class="empty"><i class="ti ti-clipboard-check"></i><p>Tidak ada pengajuan</p></div>';
  const lvlBadge = {supervisor:'b-amber',manajer:'b-teal',admin_hrd:'b-blue'};
  const typeIco = {leave:'ti-calendar-event',other:'ti-file-description'};
  return list.map(a=>`
    <div class="apr-card" id="apr-${a.id}">
      <div class="apr-ico" style="${a.tipe==='leave'?'background:#E1F5EE;color:#0F6E56':''}">
        <i class="ti ${typeIco[a.tipe]||'ti-file-description'}"></i>
      </div>
      <div class="apr-info">
        <div class="apr-name">${a.jenis} ${a.tipe==='leave'?'<span class="badge b-teal" style="font-size:10px;margin-left:4px">Cuti/Izin</span>':''}</div>
        <div class="apr-sub">${a.karyawan} · ${a.tgl}</div>
        <div class="apr-ket">${a.ket}</div>
        <div style="margin-top:8px"><span class="badge ${lvlBadge[a.lvl]||'b-gray'}">Perlu Approval: ${a.lvl}</span></div>
      </div>
      <div class="apr-acts">
        ${a.status==='pending'?`
          <button class="btn btn-green" onclick="handleApr('${a.id}','approved')"><i class="ti ti-check"></i> Setuju</button>
          <button class="btn btn-red" onclick="handleApr('${a.id}','rejected')"><i class="ti ti-x"></i> Tolak</button>
        `:`<span class="badge ${a.status==='approved'?'b-green':'b-red'}" style="font-size:12px;padding:6px 12px">${a.status==='approved'?'✓ Disetujui':'✗ Ditolak'}</span>`}
      </div>
    </div>`).join('');
}

function setAprTab(filter, el){
  document.querySelectorAll('#apr-tabs .pill-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const getList = () => APPROVALS.filter(a=>{
    if(curUser.role==='supervisor') return a.lvl==='supervisor';
    if(curUser.role==='manajer') return ['supervisor','manajer'].includes(a.lvl);
    return true;
  });
  let list = getList();
  if(filter!=='semua') list = list.filter(a=>a.status===filter);
  document.getElementById('apr-list').innerHTML = aprCards(list);
}

function handleApr(id, action){
  const a = APPROVALS.find(a=>a.id===id);
  a.status = action;

  // Sync ke IZIN_HISTORY kalau ini adalah pengajuan cuti/izin
  if(a.izinId){
    const izin = IZIN_HISTORY.find(i=>i.id===a.izinId);
    if(izin){
      izin.status = action;
      izin.disetujui_oleh = curUser.nama;
      // Update kuota kalau disetujui
      if(action==='approved' && izin.durasi>0){
        const cfg = IZIN_TYPES[izin.jenis];
        if(cfg && cfg.quota && KUOTA_CUTI[izin.empId]){
          KUOTA_CUTI[izin.empId][cfg.quota].terpakai += izin.durasi;
        }
      }
    }
  }

  const card = document.getElementById('apr-'+id);
  if(card){
    card.querySelector('.apr-acts').innerHTML = `<span class="badge ${action==='approved'?'b-green':'b-red'}" style="font-size:12px;padding:6px 12px">${action==='approved'?'✓ Disetujui':'✗ Ditolak'}</span>`;
  }
  notify(action==='approved' ? 'Pengajuan berhasil disetujui!' : 'Pengajuan ditolak.');
  updateNavBadges();
}

function saveAddAkun(){

  const email=document.getElementById('ak-email').value.trim().toLowerCase();

  const pass2=document.getElementById('ak-pass2').value;
  if(!nama){notify('Nama wajib diisi!');return;}

  ACCOUNTS.push({nama,email,pass,role:document.getElementById('ak-role').value,dept:document.getElementById('ak-dept').value});

  notify(`Akun ${nama} berhasil dibuat!`);

      <div class="fg"><label>Email</label><input id="ak-email" type="email" value="${a.email}"></div>
      <div class="fg fg-full"><label>Password Baru <span style="color:#bbb;font-weight:400">(kosongkan jika tidak diubah)</span></label><input id="ak-pass" type="password"></div>
      <div class="fg"><label>Role</label><select id="ak-role">${Object.entries(ROLE_CFG).map(([k,v])=>`<option value="${k}" ${a.role===k?'selected':''}>${v.label}</option>`).join('')}</select></div>
      <div class="fg"><label>Departemen</label><select id="ak-dept">${DEPTS.map(d=>`<option ${a.dept===d?'selected':''}>${d}</option>`).join('')}</select></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveEditAkun(${i})"><i class="ti ti-device-floppy"></i> Simpan</button>
    </div>`;
  openModal();
}

function saveEditAkun(i){
  ACCOUNTS[i].nama=document.getElementById('ak-nama').value.trim()||ACCOUNTS[i].nama;
  const newEmail=document.getElementById('ak-email').value.trim().toLowerCase();
  if(newEmail&&newEmail!==ACCOUNTS[i].email&&ACCOUNTS.find((a,idx)=>a.email===newEmail&&idx!==i)){notify('Email sudah digunakan!');return;}
  if(newEmail) ACCOUNTS[i].email=newEmail;
  const newPass=document.getElementById('ak-pass').value;
  if(newPass){if(newPass.length<6){notify('Password minimal 6!');return;} ACCOUNTS[i].pass=newPass;}
  ACCOUNTS[i].role=document.getElementById('ak-role').value;
  ACCOUNTS[i].dept=document.getElementById('ak-dept').value;
  closeModal();
  notify('Akun berhasil diperbarui!');
  renderAkun(document.getElementById('content'),document.getElementById('tb-acts'));
}

// ══════════════════════════════════════════════
//  MY SLIP (USER)
// ══════════════════════════════════════════════
function renderMySlip(c){
  const empId=curUser.empId;
  const e=EMPLOYEES.find(e=>e.id===empId);
  if(!e){c.innerHTML='<div class="empty"><i class="ti ti-receipt"></i><p>Data karyawan tidak ditemukan</p></div>';return;}
  if(!GAJI_DATA[empId]) GAJI_DATA[empId]={tambahan:[],potongan:[],periode:'Mei 2024'};
  c.innerHTML=`
    <div style="display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap">
      <select id="my-periode" style="padding:8px 12px;border:0.5px solid #D0CFC8;border-radius:9px;font-size:13px;font-family:'DM Sans',sans-serif" onchange="refreshMySlip()">
        <option>Mei 2024</option><option>April 2024</option><option>Maret 2024</option><option>Februari 2024</option>
      </select>
      <button class="tb-btn" onclick="notify('Mengunduh slip gaji PDF...')"><i class="ti ti-download"></i> Unduh PDF</button>
    </div>
    <div style="max-width:600px" id="my-slip-content">${buildMySlip(empId,'Mei 2024')}</div>`;
}

function refreshMySlip(){
  const periode=document.getElementById('my-periode')?.value||'Mei 2024';
  const w=document.getElementById('my-slip-content');
  if(w) w.innerHTML=buildMySlip(curUser.empId,periode);
}

function buildMySlip(id,periode){
  const e=EMPLOYEES.find(e=>e.id===id);
  const g=GAJI_DATA[id]||{tambahan:[],potongan:[]};
  const totalT=g.tambahan.reduce((s,t)=>s+t.jml,0);
  const totalP=g.potongan.reduce((s,p)=>s+p.jml,0);
  const thp=e.gapok+totalT-totalP;
  return `<div class="slip-wrap">
    <div class="slip-hdr"><div class="slip-co">PT. Maju Bersama Indonesia</div><div class="slip-period">Slip Gaji Karyawan · ${periode}</div></div>
    <div class="slip-body">
      <div class="slip-emp-row">
        <div class="sei"><div class="sei-l">Nama</div><div class="sei-v">${e.nama}</div></div>
        <div class="sei"><div class="sei-l">ID</div><div class="sei-v">${e.id}</div></div>
        <div class="sei"><div class="sei-l">Jabatan</div><div class="sei-v">${e.jabatan}</div></div>
        <div class="sei"><div class="sei-l">Departemen</div><div class="sei-v">${e.dept}</div></div>
      </div>
      <table class="slip-tbl">
        <tr><td class="lbl">Gaji Pokok</td><td class="amt">Rp ${e.gapok.toLocaleString('id')}</td></tr>
        ${g.tambahan.map(t=>`<tr><td class="lbl">${t.ket||'Tunjangan'}</td><td class="amt" style="color:#3B6D11">+ Rp ${t.jml.toLocaleString('id')}</td></tr>`).join('')}
        ${totalT>0?`<tr style="background:#F8F7F2"><td class="lbl" style="font-weight:600">Subtotal</td><td class="amt" style="font-weight:600">Rp ${(e.gapok+totalT).toLocaleString('id')}</td></tr>`:''}
        ${g.potongan.map(p=>`<tr><td class="lbl" style="color:#A32D2D">${p.ket||'Potongan'}</td><td class="amt" style="color:#A32D2D">− Rp ${p.jml.toLocaleString('id')}</td></tr>`).join('')}
      </table>
    </div>
    <div class="slip-total">
      <div><div class="slip-total-lbl">Gaji Bersih (Take Home Pay)</div><div style="font-size:11px;color:#888;margin-top:2px">${periode}</div></div>
      <div class="slip-total-val">Rp ${thp.toLocaleString('id')}</div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
//  MY PROFILE
// ══════════════════════════════════════════════
function renderMyProfile(c){
  const empId=curUser.empId;
  const e=EMPLOYEES.find(e=>e.id===empId)||{nama:curUser.nama,jabatan:'-',dept:curUser.dept,id:'-',email:curUser.email,telp:'-',tgl_masuk:'-',status:'aktif',gender:'-'};
  const initials=e.nama.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  c.innerHTML=`
    <div class="card" style="max-width:540px">
      <div style="display:flex;align-items:center;gap:18px;margin-bottom:22px">
        <div style="width:60px;height:60px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#185FA5;flex-shrink:0">${initials}</div>
        <div><div style="font-size:18px;font-weight:700;letter-spacing:-.3px">${e.nama}</div><div style="font-size:13px;color:#888;margin-top:3px">${e.id} · ${e.jabatan}</div></div>
      </div>
      <table style="font-size:13px">
        ${[['Departemen',e.dept],['Gender',e.gender||'-'],['Tanggal Masuk',e.tgl_masuk],['Email',e.email||'-'],['No. Telepon',e.telp||'-'],['Status',null,e.status]].map(([l,v,badge])=>`<tr>
          <td style="color:#888;padding:9px 0;width:140px;font-weight:500">${l}</td>
          <td>${badge?`<span class="badge ${badge==='aktif'?'b-green':'b-red'}">${badge}</span>`:v}</td>
        </tr>`).join('')}
      </table>
      <div style="margin-top:18px;padding-top:16px;border-top:0.5px solid #E8E7E0">
        <button class="btn" onclick="openUbahPassword()"><i class="ti ti-lock"></i> Ubah Password</button>
      </div>
    </div>`;
}

function openUbahPassword(){
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title">Ubah Password</div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="fg"><label>Password Lama</label><input id="p-lama" type="password"></div>
      <div class="fg"><label>Password Baru</label><input id="p-baru" type="password" placeholder="Minimal 6 karakter"></div>
      <div class="fg"><label>Konfirmasi Password Baru</label><input id="p-baru2" type="password"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveUbahPass()"><i class="ti ti-check"></i> Ubah Password</button>
    </div>`;
  openModal();
}

function saveUbahPass(){
  const lama=document.getElementById('p-lama').value;
  const baru=document.getElementById('p-baru').value;
  const baru2=document.getElementById('p-baru2').value;
  const acc=ACCOUNTS.find(a=>a.email===curUser.email);
  if(!acc||acc.pass!==lama){notify('Password lama salah!');return;}
  if(baru.length<6){notify('Password baru minimal 6 karakter!');return;}
  if(baru!==baru2){notify('Konfirmasi password tidak cocok!');return;}
  acc.pass=baru;
  closeModal();
  notify('Password berhasil diubah!');
}

// ══════════════════════════════════════════════
//  MODAL & NOTIF
// ══════════════════════════════════════════════
function openModal(){ document.getElementById('modal-overlay').classList.add('open'); }
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-box').style.width = '';
  selIzinType = null;
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if(e.target===document.getElementById('modal-overlay')) closeModal();
});

let _nt;
function notify(msg){
  const n=document.getElementById('notif');
  n.textContent=msg;
  n.style.display='block';
  n.style.opacity='1';
  clearTimeout(_nt);
  _nt=setTimeout(()=>{n.style.opacity='0';setTimeout(()=>n.style.display='none',300);},2800);
}
</script>
</body>
